# ============================================
# OpenCode WebUI - 简单双服务部署
# ============================================
# 包含：前端 UI + opencode 后端
#
# 使用方法：
#   cp .env.example .env
#   编辑 .env 填写 API Key
#   docker compose -f docker-compose.simple.yml up -d --build
#
# 访问 http://localhost:3000

services:
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend-simple
      args:
        - VITE_DEFAULT_PROJECT_DIR=${VITE_DEFAULT_PROJECT_DIR:-}
        - NPM_REGISTRY=${NPM_REGISTRY:-https://registry.npmjs.org/}
        - NPM_REGISTRY_FALLBACK=${NPM_REGISTRY_FALLBACK:-https://registry.npmmirror.com/}
    image: opencodeui-frontend-simple:local
    container_name: opencode-frontend
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      - backend
    networks:
      - opencode-net

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        USE_CHINA_MIRROR: ${USE_CHINA_MIRROR:-1}
        APT_MIRROR: ${APT_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        APT_SECURITY_MIRROR: ${APT_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
        NODEJS_ORG_MIRROR: ${NODEJS_ORG_MIRROR:-https://npmmirror.com/mirrors/node}
        MISE_INSTALL_URL: ${MISE_INSTALL_URL:-https://mise.run}
        OPENCODE_INSTALL_URL: ${OPENCODE_INSTALL_URL:-https://opencode.ai/install}
    image: opencodeui-backend:local
    container_name: opencode-backend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - ${WORKSPACE:-./workspace}:/workspace
      - opencode-home:/root
    working_dir: /workspace
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_SERVER_PASSWORD:-}
      - OPENCODE_SERVER_USERNAME=${OPENCODE_SERVER_USERNAME:-opencode}
      - DOCKER_API_VERSION=${DOCKER_API_VERSION:-1.40}
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
      - NODEJS_ORG_MIRROR=${NODEJS_ORG_MIRROR:-https://npmmirror.com/mirrors/node}
      - PIP_INDEX_URL=${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
      - PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - TERM=xterm-256color
      - COLORTERM=truecolor
      - MISE_DATA_DIR=/root/.local/share/mise
      - MISE_CONFIG_DIR=/root/.config/mise
      - MISE_STATE_DIR=/root/.local/state/mise
      - PATH=/root/.local/bin:/root/.cargo/bin:/root/.local/share/mise/shims:/root/.local/share/mise/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    networks:
      - opencode-net

volumes:
  opencode-home:

networks:
  opencode-net:
    name: opencode-net